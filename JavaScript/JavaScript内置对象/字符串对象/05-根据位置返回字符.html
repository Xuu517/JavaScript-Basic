  <script>

    var str='andy';
    console.log(str.charAt(3));
    //2.charCodeAt(index) 返回相应索引号的字符ASCII值  目的：看了用户按了那个键
    console.log(str.charCodeAt(0));
    //3.str[index]获取指定位置处的字符 H5新增的
    console.log(str[1]);


  </script>
