  <script>
    //利用这种方法判断有没有该属性 对象['属性名']
    // var o={
    //   age:18
    // }

    // if(o['age']){
    //   console.log('存在该属性');
    // }
    // else{
    //   console.log('不存在该属性');
    // }
    // 判断字符串'aansgifnbsyuoasn'出现最多的字符，并统计其次数
    //用charAt()遍历这个字符串
    //把每个字符都存储给对象，如果对象没有该属性，就为1，如果存在了就加1
    //遍历对象，得到最大值和该字符
    var str='aaansgifnbsyuoasn';
    var o={}
    for(var i=0;i<str.length;i++){
      var chars=str.charAt(i);
      if(o[chars]){//判断是否存在该属性
        o[chars]++;
      }else{
        o[chars]=1;
      }
    }
    console.log(o);
    //取最大值，用for in
    //遍历对象
    var ch='';
    var max=0;
    for(var k in o){
      if( o[k]>max)
      max=o[k];
      ch=k;
    }
    console.log(max);
    console.log(ch);
  </script>
