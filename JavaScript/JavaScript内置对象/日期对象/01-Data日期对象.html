<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    // Data()日期对象是一个构造函数 必须使用new来调用创建我们的日期对象
    var arr=new Array();//创建一个数组对象
    //1.使用Data 如果没有参数返回当前系统当前时间
    var data=new Date();
    console.log(data);
    //2.参数常用的写法 数字型 2019,10,01  或者字符串型'2019-10-01 8:9:8'
    var date1=new Date(2019,10,1);
    console.log(date1);//返回11月
    var date2=new Date('2019-5-1');
    console.log(date2);
    // 更准确一点
  </script>
</head>

</html>
