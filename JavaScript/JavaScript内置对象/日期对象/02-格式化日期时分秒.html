  <script>
    //要求封装一个函数返回当前的时分秒 格式：08:08:08
    function getTime(){
      var time=new Date();
      var h=time.getHours();
      h=h< 10 ? '0'+h : h;
      var m=time.getMinutes();
      m=m< 10 ? '0'+m : m;
      var s=time.getSeconds();
      s=s< 10 ? '0'+s : s;
      var s=time.getSeconds();

      console.log( h+':'+m+':'+s);

    }
    getTime();


  </script>
