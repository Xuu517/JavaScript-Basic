<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- 核心算法：我们遍历旧数组，然后拿着就数组元素去遍历新数组，如果该元素在新数组中没有出现过，我们就添加 -->
  <!-- 利用indexOf算法 -->
  <script>
    function unique(arr){
    var newArr=[];
    for(var i=1;i<arr.length;i++){
      if(newArr.indexOf(arr[i])===-1){
        newArr.push(arr[i]);
      }
    }
    return newArr;
  }
  var demo =unique([1,2,3,2,1,2,3,111,234]);
  console.log(demo);
  </script>
