<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    //添加删除数组元素
    //1.push()在我们数组的末尾 添加一个或者多个元素数组
    var arr=[1,2,3];
    //arr.push(4,'pink');
    console.log(arr.push(4,'pink'));
    console.log(arr);

    

    //push是可以给数组追加新的元素
    //push()参数直接写 数组元素就可以了
    //push完毕之后，返回的结果是 新数组的长度

    //unshift push()在我们数组的开头 添加一个或者多个元素数组
    arr.unshift('red');
    console.log(arr);
    console.log(arr.unshift('red'));

    //pop()可以删除数组的最后一个元素
    
    console.log(arr.pop());
    console.log(arr);

    //pop是删除数组的最后一个元素
    // pop()没有参数
    // pop完毕之后 返回的结果是删除的那个元素
    // 原数组也会发生变化

    //shift可以删除数组的第一个元素
    console.log(arr.shift());
    console.log(arr);

    //3.可以使用element.getElementsByTagName()
  </script>
</head>

</body>
</html>
