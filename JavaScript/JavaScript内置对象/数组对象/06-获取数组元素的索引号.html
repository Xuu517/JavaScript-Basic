  <title>Document</title>
  <script>
    //返回数组元素索引号方法 indexOf(数组元素) 作用就是返回该数组的索引号
    //他只返回第一个满足条件的索引号
    //他如果找不到该数组里面找不到元素，则返回的是-1
    var arr=['red','green','blue','pink'];
    console.log(arr.indexOf('blue'));

    //lastIndexOf(从后面开始查找的
  </script>
