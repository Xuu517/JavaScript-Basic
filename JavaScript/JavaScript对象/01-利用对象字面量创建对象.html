<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    //1.利用对象字面量创建对象
    //var obj={}
    var obj={
      uname:"张三丰",
      age:18,
      sex:"男",
      sayHi:function(){
        console.log('hi!');
      }
    }

    //1里面的属性或者方法我们采取键值对的形式 键：属性名 值：属性值
    //2多个属性或者方法之间用逗号隔开
    //3.方法冒号后面跟一个匿名函数
    // 二.适用对象
    //调用对象属性时 采用对象名.属性名 我们理解为的
    console.log(obj.uname);
    // 调用属性还有一种方法 对象名['属性名']
    console.log(obj['age']);
    // 调用对象方法 对象名.方法名() 千瓦别忘记添加小括号
    console.log(obj.sayHi);


  </script>

</head>
<body>
  
</body>
</html>
